<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coast Wave QR Builder</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body { margin:0; font-family:Arial; background:#f4f4f4; }
.page { display:flex; height:100vh; }

.left { width:350px; padding:20px; background:#fff; overflow:auto; }
.right { flex:1; display:flex; justify-content:center; align-items:center; }

input, button { width:100%; margin-top:10px; padding:10px; }

.frame-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-top:10px; }

.frame-grid img {
width:100%;
border:2px solid #ccc;
cursor:pointer;
}

.frame-grid img.selected { border-color:black; }

.preview { position:relative; width:400px; height:400px; }

#qrCanvas { width:260px; height:260px; position:absolute; top:70px; left:70px; }

#frameOverlay {
position:absolute;
width:400px;
height:400px;
top:0;
left:0;
}
</style>
</head>

<body>

<div class="page">

<div class="left">

<h2>QR Builder</h2>

<input id="text" placeholder="Enter link or text">

<label>QR Color (main)</label>
<input type="color" id="colorMain" value="#000000">

<label>Corner Outer</label>
<input type="color" id="colorOuter" value="#000000">

<label>Corner Inner</label>
<input type="color" id="colorInner" value="#000000">

<h3>Frames</h3>
<div class="frame-grid" id="frames"></div>

<button onclick="generate()">Generate</button>

</div>

<div class="right">
<div class="preview">
<canvas id="qrCanvas"></canvas>
<img id="frameOverlay">
</div>
</div>

</div>

<script>
let selectedFrame = "";

function generate() {
const text = document.getElementById("text").value || "https://google.com";
const color = document.getElementById("colorMain").value;

QRCode.toCanvas(document.getElementById("qrCanvas"), text, {
width:260,
color:{ dark:color, light:"#ffffff" }
});
}

function loadFrames() {
const container = document.getElementById("frames");

for (let i = 1; i <= 40; i++) {
const name = "frame" + i + ".png";

const img = document.createElement("img");
img.src = name;

img.onclick = () => {
document.querySelectorAll(".frame-grid img").forEach(x=>x.classList.remove("selected"));
img.classList.add("selected");

selectedFrame = name;
document.getElementById("frameOverlay").src = name;
};

img.onerror = () => img.style.display = "none";

container.appendChild(img);
}
}

loadFrames();
generate();
</script>

</body>
</html>
